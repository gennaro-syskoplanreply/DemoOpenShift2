kind: Deployment
apiVersion: apps/v1
metadata:
  name: demoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-springboot-app
  template:
    metadata:
      labels:
        app: java-springboot-app
    spec:
      containers:
        - name: demoapp
          image: image-registry.openshift-image-registry.svc:5000/gennaro-syskoplan-dev/demoapp:latest
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgresql:5432/dbDemo"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: database-name
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: database-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: database-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: KAFKA_TOPIC
            - name: KAFKA_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: KAFKA_GROUP_ID
          resources:
            requests:
              memory: "180Mi"
              cpu: "10m"
---
kind: Service
apiVersion: v1
metadata:
  name: demoapp-svc
spec:
  ports:
    - name: http-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: java-springboot-app

---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: demoapp-route
spec:
  to:
    kind: Service
    name: demoapp-svc
  port:
    targetPort: http-8081
  tls:
    termination: edge